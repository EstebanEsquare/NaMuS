<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90D9">
    <meta name="description" content="Güvenli şirket içi sohbet uygulaması">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sohbet">
    
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <title>Sohbet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <h1>🔐 Sohbet</h1>
                <p class="subtitle">Şirket İçi Güvenli Sohbet</p>
                <input type="password" id="password-input" placeholder="Şifre giriniz" autocomplete="off">
                <button id="login-btn" class="primary-btn">Giriş Yap</button>
                <p id="login-error" class="error-message"></p>
            </div>
        </div>

        <div id="color-screen" class="screen">
            <div class="color-container">
                <h2>Renk Seçin</h2>
                <p class="subtitle">Mesaj balonlarınızın rengini seçin</p>
                <div class="color-options">
                    <button id="blue-btn" class="color-btn blue">
                        <span>🔵 Mavi</span>
                    </button>
                    <button id="pink-btn" class="color-btn pink">
                        <span>🩷 Pembe</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="chat-screen" class="screen">
            <header class="chat-header">
                <h1>💬 Sohbet</h1>
                <button id="logout-btn" class="logout-btn" title="Çıkış Yap">🚪 Çıkış</button>
            </header>
            
            <div id="messages-container" class="messages-container">
                <div id="messages-list" class="messages-list"></div>
            </div>
            
            <div class="message-input-container">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Mesaj yazın..." 
                    autocomplete="off"
                >
                <button id="send-btn" class="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="firebase.js" defer></script>
    <script src="auth.js" defer></script>
    <script src="chat.js" defer></script>
    <script src="app.js" defer></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
